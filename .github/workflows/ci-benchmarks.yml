name: 'CI: Benchmarks'

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'benchmarks/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: codspeed-macro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: pnpm --filter benchmarks bench:run
