<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200">

  <!-- Window frame -->
  <rect width="1920" height="1200" rx="12" ry="12" fill="#1e1e2e" />

  <!-- Title bar background -->
  <rect width="1920" height="48" rx="12" ry="12" fill="#181825" />
  <rect y="36" width="1920" height="12" fill="#181825" />

  <!-- Traffic lights -->
  <circle cx="28" cy="24" r="7" fill="#f38ba8" />
  <circle cx="52" cy="24" r="7" fill="#f9e2af" />
  <circle cx="76" cy="24" r="7" fill="#a6e3a1" />

  <!-- Browser tab (empty) -->
  <rect x="100" y="8" width="200" height="40" rx="8" ry="8" fill="#1e1e2e" />

  <!-- Separator under title bar -->
  <line x1="0" y1="48" x2="1920" y2="48" stroke="#313244" stroke-width="1" />

  <!-- URL bar background -->
  <rect y="48" width="1920" height="40" fill="#181825" />

  <!-- Nav buttons: back -->
  <path d="M30 68l-7 0 7-7M23 68l7 7" stroke="#6c7086" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Nav buttons: forward -->
  <path d="M52 61l7 7-7 7" stroke="#6c7086" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Nav buttons: refresh -->
  <circle cx="80" cy="68" r="7" stroke="#6c7086" stroke-width="2" fill="none" />
  <path d="M80 61v4" stroke="#6c7086" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- URL pill (empty) -->
  <rect x="104" y="55" width="1770" height="26" rx="13" ry="13" fill="#1e1e2e" />

  <!-- Menu dots -->
  <circle cx="1898" cy="60" r="2" fill="#6c7086" />
  <circle cx="1898" cy="68" r="2" fill="#6c7086" />
  <circle cx="1898" cy="76" r="2" fill="#6c7086" />

  <!-- Separator under URL bar -->
  <line x1="0" y1="88" x2="1920" y2="88" stroke="#313244" stroke-width="1" />

  <!-- Content area (empty) -->
  <rect x="0" y="88" width="1920" height="1100" fill="#1e1e2e" />
  <rect x="0" y="1188" width="1920" height="12" rx="12" ry="12" fill="#1e1e2e" />

</svg>
